<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Empleos - Login</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
  </head>
  <body class="bg-light min-vh-100 d-flex flex-column justify-content-center">
    <div class="container py-4 py-md-5">

        <!-- Título -->
        <div class="text-center mb-4 px-2">
          <h2 class="fw-bold">Crea tu cuenta</h2>
          <p class="text-muted">Únete a EmpleosPro y comienza tu búsqueda de empleo</p>
        </div>

        <!-- Cards de rol -->
        <div class="row justify-content-center g-3 mb-4 px-2">
          <div class="col-6 col-sm-auto">
            <div class="card border text-center p-3 h-100" style="cursor: pointer; min-width: 140px;">
              <i class="bi bi-person-fill fs-2 text-primary mb-2"></i>
              <span class="fw-semibold">Busco Empleo</span>
            </div>
          </div>
          <div class="col-6 col-sm-auto">
            <div class="card border text-center p-3 h-100" style="cursor: pointer; min-width: 140px;">
              <i class="bi bi-building fs-2 text-secondary mb-2"></i>
              <span class="fw-semibold">Soy empresa</span>
            </div>
          </div>
        </div>

        <!-- Formulario -->
        <div class="row justify-content-center px-2">
          <div class="col-12 col-sm-10 col-md-8 col-lg-7">
            <div class="card border p-3 p-md-4">
              <div class="row g-3">
                <div class="col-12 col-md-6">
                  <label class="form-label fw-semibold">Nombre Completo</label>
                  <input type="text" class="form-control" placeholder="Ejemplo" />
                </div>
                <div class="col-12 col-md-6">
                  <label class="form-label fw-semibold">Correo electrónico</label>
                  <input type="email" class="form-control" placeholder="tu@email.com" />
                </div>
                <div class="col-12 col-md-6">
                  <label class="form-label fw-semibold">Contraseña</label>
                  <input type="password" class="form-control" placeholder="Mínimo 8 caracteres" />
                </div>
                <div class="col-12 col-md-6">
                  <label class="form-label fw-semibold">Confirmar contraseña</label>
                  <input type="password" class="form-control" placeholder="Repite tu contraseña" />
                </div>
                <div class="col-12 mt-2">
                  <button class="btn btn-primary w-100 py-2">Crear cuenta</button>
                </div>
              </div>
            </div>

            <div class="text-center mt-3">
              <span class="text-muted small">¿Ya tienes cuenta? </span>
              <a href="#" class="text-primary small text-decoration-none fw-semibold">Inicia sesion</a>
            </div>
          </div>
        </div>

      </div>
    </div>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
