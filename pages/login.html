<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Empleos - Login</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
  </head>
  <body class="bg-light min-vh-100 d-flex flex-column justify-content-center">
    <div class="container py-4 py-md-5">
      <div class="text-center mb-4 px-2">
        <h2 class="fw-bold fs-2 fs-md-2">Bienvenido de nuevo</h2>
        <p class="text-muted">Inicia sesión en tu cuenta de empresasPro</p>
      </div>

      <div class="row justify-content-center g-2 g-md-3 mb-4 px-2">
        <div class="col-4 col-sm-auto">
          <div
            class="card border text-center p-2 p-md-3 h-100"
            style="cursor: pointer; min-width: 100px"
          >
            <i
              class="bi bi-person-fill fs-2 fs-md-2 mb-1 mb-md-2"
              style="color: blue"
            ></i>
            <span class="fw-semibold small">Candidato</span>
          </div>
        </div>
        <div class="col-4 col-sm-auto">
          <div
            class="card border text-center p-2 p-md-3 h-100"
            style="cursor: pointer; min-width: 100px"
          >
            <i
              class="bi bi-building fs-2 fs-md-2 mb-1 mb-md-2"
              style="color: blue"
            ></i>
            <span class="fw-semibold small">Empresa</span>
          </div>
        </div>
        <div class="col-4 col-sm-auto">
          <div
            class="card border text-center p-2 p-md-3 h-100"
            style="cursor: pointer; min-width: 100px"
          >
            <i
              class="bi bi-person-badge fs-2 fs-md-2 mb-1 mb-md-2"
              style="color: blue"
            ></i>
            <span class="fw-semibold small">Admin</span>
          </div>
        </div>
      </div>

      <div class="row justify-content-center px-2">
        <div class="col-12 col-sm-10 col-md-7 col-lg-5">
          <div class="card border p-3 p-md-4">
            <div class="mb-3">
              <label class="form-label fw-semibold">Correo electrónico</label>
              <input
                type="email"
                class="form-control"
                placeholder="tu@email.com"
              />
            </div>
            <div class="mb-4">
              <label class="form-label fw-semibold">Contraseña</label>
              <input
                type="password"
                class="form-control"
                placeholder="••••••••••"
              />
            </div>
            <button class="btn btn-primary w-100">Iniciar sesión</button>
          </div>
          <div class="text-center mt-3">
            <span class="text-muted small">¿No tienes cuenta? </span>
            <a
              href="#"
              class="text-primary small text-decoration-none fw-semibold"
              >Regístrate gratis</a
            >
          </div>
        </div>
      </div>
    </div>
    
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
